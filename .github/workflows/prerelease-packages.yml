name: Pre-release Packages

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run without publishing or pushing changes
        required: false
        type: boolean
        default: false
      skip-docs:
        description: Skip deploying documentation to the preview environment
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}

jobs:
  prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DRY_RUN: ${{ inputs.dry-run || false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get and cache dependencies
        uses: ./.github/actions/cached-deps

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Determine prerelease version
        id: detect
        run: |
          LATEST=$(npm view @ngx-formbar/core dist-tags.latest 2>/dev/null || echo "")
          CURRENT_NEXT=$(npm view @ngx-formbar/core dist-tags.next 2>/dev/null || echo "")

          # If the base of next is <= latest, it's stale (from a previous release cycle)
          if [ -n "$CURRENT_NEXT" ] && [ -n "$LATEST" ] && [[ "$CURRENT_NEXT" == *"-next."* ]]; then
            NEXT_BASE="${CURRENT_NEXT%-next.*}"
            IS_STALE=$(node -e "
              const a = '${LATEST}'.split('.').map(Number);
              const b = '${NEXT_BASE}'.split('.').map(Number);
              const cmp = (a[0] - b[0]) || (a[1] - b[1]) || (a[2] - b[2]);
              process.stdout.write(cmp >= 0 ? 'true' : 'false');
            ")
            if [ "$IS_STALE" = "true" ]; then
              echo "Next version ${CURRENT_NEXT} is behind latest ${LATEST}, starting fresh"
              CURRENT_NEXT=""
            fi
          fi

          if [ -n "$CURRENT_NEXT" ] && [[ "$CURRENT_NEXT" == *"-next."* ]]; then
            BASE="${CURRENT_NEXT%-next.*}"
            NUM="${CURRENT_NEXT##*-next.}"
            NEXT_NUM=$((NUM + 1))
            SPECIFIER="${BASE}-next.${NEXT_NUM}"
            echo "specifier=${SPECIFIER}" >> "$GITHUB_OUTPUT"
            echo "Incrementing from ${CURRENT_NEXT} to ${SPECIFIER}"
          else
            echo "No usable next version, will derive from conventional commits"
          fi

      - name: Version packages (prerelease)
        run: |
          SPECIFIER="${{ steps.detect.outputs.specifier }}"
          if [ -n "$SPECIFIER" ]; then
            npx nx release version "$SPECIFIER"
          else
            npx nx release version --preid next
          fi

      - name: Read resolved version
        id: resolved
        run: |
          VERSION=$(node -p "require('./libs/core/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Build all packages
        run: npx nx run-many -t build --skip-nx-cache && npx nx run @ngx-formbar/reactive-forms:clean-schematics

      - name: Create git tags and GitHub pre-releases
        if: env.DRY_RUN != 'true'
        run: |
          declare -A PACKAGES=(
            ["@ngx-formbar/core"]="libs/core/package.json"
            ["@ngx-formbar/reactive-forms"]="libs/reactive-forms/package.json"
            ["@ngx-formbar/schematics"]="libs/schematics/package.json"
            ["@ngx-formbar/setup"]="libs/setup/package.json"
          )

          for pkg in "${!PACKAGES[@]}"; do
            pkg_json="${PACKAGES[$pkg]}"
            version=$(node -p "require('./${pkg_json}').version")
            tag="${pkg}@${version}"

            if [[ "$version" != *"-next."* ]]; then
              echo "$pkg version $version is not a pre-release, skipping"
              continue
            fi

            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists, skipping"
              continue
            fi

            echo "Creating pre-release tag $tag"
            git tag "$tag"
          done

          git push origin --tags

          for pkg in "${!PACKAGES[@]}"; do
            pkg_json="${PACKAGES[$pkg]}"
            version=$(node -p "require('./${pkg_json}').version")
            tag="${pkg}@${version}"

            if [[ "$version" != *"-next."* ]]; then
              continue
            fi

            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --prerelease \
              --latest=false || echo "Release $tag already exists, skipping"
          done

      - name: Publish to npm
        if: env.DRY_RUN != 'true'
        run: npx nx release publish --tag next --provenance

      - name: Dry-run summary
        if: env.DRY_RUN == 'true'
        run: |
          echo "::notice::Dry-run mode — skipped tagging, GitHub releases, and npm publish"
          echo "::group::Pre-release versions"
          for pkg_json in libs/core/package.json libs/reactive-forms/package.json libs/schematics/package.json libs/setup/package.json; do
            name=$(node -p "require('./${pkg_json}').name")
            version=$(node -p "require('./${pkg_json}').version")
            echo "  $name@$version"
          done
          echo "::endgroup::"

  deploy-docs:
    if: ${{ !(inputs.dry-run || false) && !(inputs.skip-docs || false) }}
    needs: prerelease
    uses: ./.github/workflows/publish-docs.yml
    with:
      environment: preview
    secrets: inherit
