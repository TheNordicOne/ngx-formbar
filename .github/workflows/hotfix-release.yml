name: Hotfix Release

on:
  push:
    branches:
      - '[0-9]*.[0-9]*.x'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish-packages.yml
    with:
      mode: hotfix
    secrets: inherit
