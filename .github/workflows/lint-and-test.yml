name: Test and Lint

on:
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'projects/core/**'
      - 'projects/reactive-forms/**'
      - 'projects/schematics/**'
      - 'angular.json'
      - 'tsconfig*.json'
      - 'eslint.config.mjs'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:

  lint_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Get and cache dependencies
        uses: ./.github/actions/cached-dependencies

      - name: Lint
        run: npm run lint

      - name: Build (required for schematic tests)
        run: npm run build

      - name: Run component tests
        run: |
          npx vitest run --root projects/core --project component
          npx vitest run --root projects/reactive-forms --project component

      - name: Run node tests
        run: npx vitest run --project node

      - name: Run Cypress tests
        run: npx cypress run --component
