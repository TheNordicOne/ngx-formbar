name: Release Packages

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore: version packages')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Get and cache dependencies
        uses: ./.github/actions/cached-dependencies

      - name: Build all packages
        run: npm run build

      - name: Detect changed packages and create releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -A PACKAGES=(
            ["@ngx-formbar/core"]="projects/core/package.json dist/core"
            ["@ngx-formbar/reactive-forms"]="projects/reactive-forms/package.json dist/reactive-forms"
            ["@ngx-formbar/schematics"]="projects/schematics/package.json dist/schematics"
          )

          for pkg in "${!PACKAGES[@]}"; do
            read -r pkg_json dist_dir <<< "${PACKAGES[$pkg]}"
            version=$(jq -r .version "$pkg_json")
            tag="${pkg}@${version}"

            # Skip if this tag already exists
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists, skipping"
              continue
            fi

            echo "Creating release for $tag"

            # Pack the .tgz
            cd "$dist_dir"
            npm pack
            tgz_file=$(ls *.tgz)
            cd -

            # Create GitHub release with .tgz attached
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              --latest=false \
              "$dist_dir/$tgz_file"
          done

  deploy-docs:
    needs: release
    uses: ./.github/workflows/publish-docs.yml
    with:
      environment: production
    secrets: inherit
