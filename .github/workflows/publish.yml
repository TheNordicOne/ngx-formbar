name: Publish

on:
  push:
    branches:
      - '[0-9]*.[0-9]*.x'
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:
    inputs:
      mode:
        description: Publishing mode
        type: choice
        options:
          - prerelease
          - release
        required: true
      dry-run:
        description: Run without publishing
        type: boolean
        default: false
      skip-docs:
        description: Skip deploying documentation
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
      specifier: ${{ steps.detect.outputs.specifier }}
      should-run: ${{ steps.mode.outputs.should-run }}
    steps:
      - name: Determine publishing mode
        id: mode
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ]; then
            echo "mode=hotfix" >> "$GITHUB_OUTPUT"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "pull_request" ]; then
            MERGED="${{ github.event.pull_request.merged }}"
            TITLE="${{ github.event.pull_request.title }}"
            if [ "$MERGED" = "true" ] && [[ "$TITLE" == "chore: version packages"* ]]; then
              echo "mode=release" >> "$GITHUB_OUTPUT"
              echo "should-run=true" >> "$GITHUB_OUTPUT"
            else
              echo "should-run=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup Node.js
        if: steps.mode.outputs.mode == 'prerelease'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect prerelease specifier
        if: steps.mode.outputs.mode == 'prerelease'
        id: detect
        run: |
          LATEST=$(npm view @ngx-formbar/core dist-tags.latest 2>/dev/null || echo "")
          CURRENT_NEXT=$(npm view @ngx-formbar/core dist-tags.next 2>/dev/null || echo "")

          # If the base of next is <= latest, it's stale (from a previous release cycle)
          if [ -n "$CURRENT_NEXT" ] && [ -n "$LATEST" ] && [[ "$CURRENT_NEXT" == *"-next."* ]]; then
            NEXT_BASE="${CURRENT_NEXT%-next.*}"
            IS_STALE=$(node -e "
              const a = '${LATEST}'.split('.').map(Number);
              const b = '${NEXT_BASE}'.split('.').map(Number);
              const cmp = (a[0] - b[0]) || (a[1] - b[1]) || (a[2] - b[2]);
              process.stdout.write(cmp >= 0 ? 'true' : 'false');
            ")
            if [ "$IS_STALE" = "true" ]; then
              echo "Next version ${CURRENT_NEXT} is behind latest ${LATEST}, starting fresh"
              CURRENT_NEXT=""
            fi
          fi

          if [ -n "$CURRENT_NEXT" ] && [[ "$CURRENT_NEXT" == *"-next."* ]]; then
            BASE="${CURRENT_NEXT%-next.*}"
            NUM="${CURRENT_NEXT##*-next.}"
            NEXT_NUM=$((NUM + 1))
            SPECIFIER="${BASE}-next.${NEXT_NUM}"
            echo "specifier=${SPECIFIER}" >> "$GITHUB_OUTPUT"
            echo "Incrementing from ${CURRENT_NEXT} to ${SPECIFIER}"
          else
            echo "No usable next version, will derive from conventional commits"
          fi

  publish:
    needs: resolve
    if: needs.resolve.outputs.should-run == 'true'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish-packages.yml
    with:
      mode: ${{ needs.resolve.outputs.mode }}
      specifier: ${{ needs.resolve.outputs.specifier || '' }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  deploy-docs:
    needs: [resolve, publish]
    if: >-
      needs.resolve.outputs.should-run == 'true' &&
      needs.resolve.outputs.mode != 'hotfix' &&
      !(inputs.dry-run || false) &&
      !(inputs.skip-docs || false)
    uses: ./.github/workflows/publish-docs.yml
    with:
      environment: ${{ needs.resolve.outputs.mode == 'release' && 'production' || 'preview' }}
      version: ${{ needs.publish.outputs.version }}
    secrets: inherit
