name: Release Branch Prerelease

on:
  push:
    branches:
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Get and cache dependencies
        uses: ./.github/actions/cached-dependencies

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Enter pre-release mode (if not already)
        run: |
          if [ ! -f .changeset/pre.json ]; then
            npx changeset pre enter next
          fi

      - name: Version packages
        run: npx changeset version

      - name: Commit version changes
        run: |
          git add .
          git commit -m "chore: version packages (prerelease)" --allow-empty
          git push

      - name: Build all packages
        run: npm run build

      - name: Detect changed packages and create pre-releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -A PACKAGES=(
            ["@ngx-formbar/core"]="projects/core/package.json dist/core"
            ["@ngx-formbar/reactive-forms"]="projects/reactive-forms/package.json dist/reactive-forms"
            ["@ngx-formbar/schematics"]="projects/schematics/package.json dist/schematics"
          )

          for pkg in "${!PACKAGES[@]}"; do
            read -r pkg_json dist_dir <<< "${PACKAGES[$pkg]}"
            version=$(jq -r .version "$pkg_json")
            tag="${pkg}@${version}"

            # Skip if not a pre-release version
            if [[ "$version" != *"-next."* ]]; then
              echo "$pkg version $version is not a pre-release, skipping"
              continue
            fi

            # Skip if this tag already exists
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists, skipping"
              continue
            fi

            echo "Creating pre-release for $tag"

            cd "$dist_dir"
            npm pack
            tgz_file=$(ls *.tgz)
            cd -

            gh release create "$tag" \
              --title "$tag" \
              --prerelease \
              --latest=false \
              "$dist_dir/$tgz_file"
          done

  deploy-preview-docs:
    needs: prerelease
    uses: ./.github/workflows/publish-docs.yml
    with:
      environment: preview
    secrets: inherit
