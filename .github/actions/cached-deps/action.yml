name: Get and cache dependencies
description: Set up pnpm, Node.js, install dependencies, and optionally install Playwright browsers

inputs:
  playwright:
    description: Install Playwright browsers with system dependencies
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Install Playwright browsers
      if: inputs.playwright == 'true'
      shell: bash
      run: npx playwright install --with-deps
