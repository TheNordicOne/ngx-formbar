@if (!isHidden()) {
  <div class="inline-input" [attr.data-testid]="testId()">
    <label [htmlFor]="name()" [attr.data-testid]="`${testId()}-label`">{{ label() }}</label>
    <div class="radio-group">
      @for (option of options(); track option) {
        <div class="radio-option">
          <input
            type="radio"
            [id]="option.id"
            [value]="option.value"
            [formControlName]="name()"
            [attr.data-testid]="`${testId()}-input-${option.id}`"
          />
          <label [htmlFor]="option.id">{{ option.label }}</label>
        </div>
      }
    </div>
    <ngxfb-examples-validation-errors [errors]="errors" [testId]="testId()" [dirty]="dirty" />
  </div>
}
