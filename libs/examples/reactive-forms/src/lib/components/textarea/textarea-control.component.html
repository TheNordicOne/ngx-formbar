@if (!isHidden()) {
  <div class="inline-input" [attr.data-testid]="testId()">
    <label [htmlFor]="testId()" [attr.data-testid]="`${testId()}-label`">{{ displayLabel() }}</label>
    <textarea
      [id]="testId()"
      [placeholder]="placeHolder() ?? ''"
      [formControlName]="name()"
      [readonly]="isReadonly()"
      [attr.rows]="rows() ?? null"
      [attr.maxlength]="maxLength() ?? null"
      [attr.data-testid]="`${testId()}-input`"
    ></textarea>
  </div>
}
