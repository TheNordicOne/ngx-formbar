@if (!hidden()) {
  <div class="inline-input" [attr.data-testid]="testId()">
    <label [htmlFor]="name()" [attr.data-testid]="`${testId()}-label`">{{ label() }}</label>
    <textarea
      [id]="name()"
      [placeholder]="placeHolder() ?? ''"
      [formControlName]="name()"
      [readonly]="readonly()"
      [attr.rows]="rows() ?? null"
      [attr.maxlength]="maxLength() ?? null"
      [attr.data-testid]="`${testId()}-input`"
    ></textarea>
  </div>
}
