@if (!structurallyHidden()) {
  <ng-container [formGroupName]="name()">
    <fieldset class="demo-form-group" [hidden]="attributeHidden()" [attr.data-testid]="testId()">
      <legend [attr.data-testid]="`${testId()}-title`">{{ legend() }}</legend>
      @for (content of controls(); track content[0]) {
        <ng-template *ngxfbAbstractControl="content" />
      }
    </fieldset>
  </ng-container>
  <ngxfb-examples-validation-errors [errors]="errors" [testId]="testId()" [dirty]="dirty" />
}
