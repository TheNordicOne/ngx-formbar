@if (!isHidden()) {
  <ng-container [formGroupName]="name()">
    <fieldset class="demo-form-group" [attr.data-testId]="testId()">
      <legend [attr.data-testId]="`${testId()}-title`">{{ legend() }}</legend>
      @for (content of controls(); track content[0]) {
        <ng-template *ngxfbAbstractControl="content" />
      }
    </fieldset>
  </ng-container>
  @for (error of errors() | keyvalue; track error.key) {
    <span [attr.data-testId]="`${testId()}-validation-error-${error.key}`">
      {{ error.value === true ? error.key : error.value }}
    </span>
  }
}
