@if (!isHidden()) {
  <div class="inline-input" [attr.data-testid]="testId()">
    <label [for]="name()" [attr.data-testid]="`${testId()}-label`">{{ displayLabel() }}</label>
    <select
      [id]="name()"
      [formControlName]="name()"
      [attr.data-testid]="`${testId()}-input`"
    >
      @for (option of options(); track option) {
        <option [id]="option.id" [value]="option.value">
          {{ option.label }}
        </option>
      }
    </select>
  </div>
}
