<fieldset class="array-group" [attr.data-testid]="testId()">
  <legend [attr.data-testid]="`${testId()}-label`">{{ displayLabel() }}</legend>
  <div class="items" [formArrayName]="name()">
    @if (controls().length === 0 && emptyMessage(); as msg) {
      <p class="empty" [attr.data-testid]="`${testId()}-empty`">{{ msg }}</p>
    }

    @for (control of controls(); track control) {
      <div class="row">
        @if (itemTemplate(); as tpl) {
          <ng-container
            *ngTemplateOutlet="
              tpl;
              context: {
                $implicit: control,
                index: $index,
                removeAt: removeAt.bind(this)
              }
            "
          />
        } @else {
          <ngxfb-form-array-outlet [index]="$index" />
          <button
            type="button"
            [attr.aria-label]="`Insert ${itemLabel() ?? 'item'} above position ${$index + 1}`"
            [attr.data-testid]="`${testId()}-${$index}-insert`"
            (click)="insertAt($index)"
          >
            Insert above
          </button>
          <button
            type="button"
            [attr.aria-label]="`Move ${itemLabel() ?? 'item'} ${$index + 1} up`"
            [disabled]="$first"
            [attr.data-testid]="`${testId()}-${$index}-move-up`"
            (click)="move($index, $index - 1)"
          >
            Move up
          </button>
          <button
            type="button"
            [attr.aria-label]="`Move ${itemLabel() ?? 'item'} ${$index + 1} down`"
            [disabled]="$last"
            [attr.data-testid]="`${testId()}-${$index}-move-down`"
            (click)="move($index, $index + 1)"
          >
            Move down
          </button>
          <button
            #removeButton
            type="button"
            [attr.aria-label]="`Remove ${itemLabel() ?? 'item'} ${$index + 1}`"
            [attr.data-testid]="`${testId()}-${$index}-remove`"
            (click)="removeAt($index)"
          >
            Remove
          </button>
        }
      </div>
    }

    <button
      type="button"
      [attr.data-testid]="`${testId()}-add`"
      (click)="add()"
    >
      {{ addLabel() ?? 'Add' }}
    </button>
  </div>
  <div class="sr-only" role="status">{{ announcement() }}</div>
  <ngxfb-examples-validation-errors
    [errors]="errors()"
    [testId]="testId()"
    [dirty]="isDirty()"
  />
</fieldset>
