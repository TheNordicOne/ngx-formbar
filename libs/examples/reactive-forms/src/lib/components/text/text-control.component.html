<div class="inline-input" [attr.data-testid]="testId()">
  <label [htmlFor]="testId()" [attr.data-testid]="`${testId()}-label`">{{ displayLabel() }}</label>
  <input
    type="text"
    [id]="testId()"
    [placeholder]="placeHolder() ?? ''"
    [title]="hint()"
    [formControlName]="name()"
    [attr.readonly]="isReadonly() || null"
    [attr.data-testid]="`${testId()}-input`"
  />
  @if (hint()) {
    <span [attr.data-testid]="`${testId()}-hint`">{{ hint() }}</span>
  }
  <ngxfb-examples-validation-errors [errors]="errors()" [testId]="testId()" [dirty]="isDirty()" />
</div>
