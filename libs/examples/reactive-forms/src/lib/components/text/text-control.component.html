@if (!isHidden()) {
  <div class="inline-input" [attr.data-testid]="testId()">
    <label [htmlFor]="name()" [attr.data-testid]="`${testId()}-label`">{{ label() }}</label>
    <input
      type="text"
      [id]="name()"
      [placeholder]="placeholder() ?? ''"
      [title]="hint()"
      [formControlName]="name()"
      [attr.readonly]="readonly() || null"
      [attr.data-testid]="`${testId()}-input`"
    />
    @if (hint()) {
      <span [attr.data-testid]="`${testId()}-hint`">{{ hint() }}</span>
    }
    @for (error of errors | keyvalue; track error.key) {
      <span [attr.data-testid]="`${testId()}-validation-error-${error.key}`">
        {{ error.value === true ? error.key : error.value }}
      </span>
    }
  </div>
}
