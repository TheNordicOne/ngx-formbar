@if (!hidden()) {
  <div class="inline-input" [attr.data-testid]="testId()">
    <label [htmlFor]="name()" [attr.data-testid]="`${testId()}-label`">{{ displayLabel() }}</label>
    <input
      type="file"
      [id]="name()"
      [formControlName]="name()"
      [attr.readonly]="readonly() || null"
      [multiple]="multiple()"
      [accept]="accept()"
      [attr.data-testid]="`${testId()}-input`"
    />
  </div>
}
