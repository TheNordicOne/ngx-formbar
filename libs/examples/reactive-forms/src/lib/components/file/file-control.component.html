@if (!isHidden()) {
  <div class="inline-input" [attr.data-testid]="testId()">
    <label [htmlFor]="testId()" [attr.data-testid]="`${testId()}-label`">{{ displayLabel() }}</label>
    <input
      type="file"
      [id]="testId()"
      [formControlName]="name()"
      [attr.readonly]="isReadonly() || null"
      [multiple]="multiple()"
      [accept]="accept()"
      [attr.data-testid]="`${testId()}-input`"
    />
  </div>
}
