@if (!isHidden()) {
  <div class="inline-input" [attr.data-testid]="testId()">
    <label [htmlFor]="testId()" [attr.data-testid]="`${testId()}-label`">{{
      displayLabel()
    }}</label>
    <input
      type="date"
      [id]="testId()"
      [formControlName]="name()"
      [attr.readonly]="isReadonly() || null"
      [min]="minDate()"
      [max]="maxDate()"
      [attr.data-testid]="`${testId()}-input`"
    />
  </div>
}
