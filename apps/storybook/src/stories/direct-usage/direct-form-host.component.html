<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <ngxfb-examples-text-control
    name="firstName"
    labelText="First Name"
    testId="firstName"
    placeHolder="Enter your name"
  />

  <ngxfb-examples-number-control
    name="age"
    labelText="Age"
    testId="age"
    [min]="0"
    [max]="150"
  />

  <ngxfb-examples-checkbox-control
    name="agree"
    labelText="I agree to the terms"
    testId="agree"
  />

  <ngxfb-examples-radio-control
    name="favoriteColor"
    labelText="Favorite Color"
    testId="favoriteColor"
    [options]="colorOptions"
  />

  <ngxfb-examples-dropdown-control
    name="country"
    labelText="Country"
    testId="country"
    [options]="countryOptions"
  />

  <ngxfb-examples-textarea-control
    name="bio"
    labelText="Biography"
    testId="bio"
    placeHolder="Tell us about yourself"
    [rows]="4"
    [maxLength]="500"
  />

  <ngxfb-examples-date-control
    name="birthDate"
    labelText="Birth Date"
    testId="birthDate"
    minDate="1900-01-01"
    maxDate="2026-12-31"
  />

  <ngxfb-examples-file-control
    name="attachment"
    labelText="Attachment"
    testId="attachment"
    [accept]="['.pdf', '.txt']"
  />

  <ngxfb-examples-group-control
    name="address"
    titleText="Address"
    testId="address"
    legend="Address"
  >
    <ng-container formGroupName="address">
      <ngxfb-examples-text-control
        name="street"
        labelText="Street"
        testId="street"
      />
      <ngxfb-examples-text-control
        name="city"
        labelText="City"
        testId="city"
      />
    </ng-container>
  </ngxfb-examples-group-control>

  <ngxfb-examples-array-control
    name="tags"
    labelText="Tags"
    testId="tags"
    [itemFactory]="newTag"
  >
    <ng-template #item let-control let-i="index" let-removeAt="removeAt">
      <div class="tag-row">
        <input
          type="text"
          placeholder="Tag"
          [formControl]="asFormControl(control)"
          [attr.data-testid]="`tags-${i}-input`"
        />
        <button
          type="button"
          [attr.data-testid]="`tags-${i}-remove`"
          (click)="removeAt(i)"
        >
          Remove
        </button>
      </div>
    </ng-template>
  </ngxfb-examples-array-control>

  <ngxfb-examples-array-control
    name="contacts"
    labelText="Contacts"
    testId="contacts"
    [itemFactory]="newContact"
  >
    <ng-template #item let-control let-i="index" let-removeAt="removeAt">
      @let contact = asContactGroup(control);
      <div class="contact-row">
        <div class="field">
          <label [htmlFor]="`contacts-${i}-name`">Name</label>
          <input
            type="text"
            [id]="`contacts-${i}-name`"
            [formControl]="contact.controls.name"
            [attr.data-testid]="`contacts-${i}-name`"
          />
        </div>
        <div class="field">
          <label [htmlFor]="`contacts-${i}-email`">Email</label>
          <input
            type="email"
            [id]="`contacts-${i}-email`"
            [formControl]="contact.controls.email"
            [attr.data-testid]="`contacts-${i}-email`"
          />
        </div>
        <button
          type="button"
          [attr.data-testid]="`contacts-${i}-remove`"
          (click)="removeAt(i)"
        >
          Remove
        </button>
      </div>
    </ng-template>
  </ngxfb-examples-array-control>

  <ngxfb-examples-note-control
    testId="info"
    message="All fields above are used directly without formbar."
  />

  <div class="story-actions">
    <button data-testid="submit" type="submit">Submit</button>
  </div>
</form>

@if (formValues().length > 0) {
  <div class="story-form-values" data-testid="form-values">
    @for (entry of formValues(); track entry.path) {
      <div>
        <span [attr.data-testid]="`${entry.path}-path`">{{ entry.path }}: </span>
        <span [attr.data-testid]="`${entry.path}-value`">{{ entry.value }}</span>
      </div>
    }
  </div>
}
