@if (!isHidden()) {
  <div class="inline-input">
    <label [for]="name()">{{ label() }}</label>
    <select [id]="name()" [formControlName]="name()">
      @for (option of options(); track option) {
        <option [id]="option.id" [value]="option.value">
          {{ option.label }}
        </option>
      }
    </select>
  </div>
}
