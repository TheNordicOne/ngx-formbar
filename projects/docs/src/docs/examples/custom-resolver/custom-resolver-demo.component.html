<div class="form-actions">
  <span>Urgency control type:</span>
  <button type="button" (click)="setChoiceMode('radio')">Radio</button>
  <button type="button" (click)="setChoiceMode('dropdown')">Dropdown</button>
</div>
<form class="demo-form" [formGroup]="form" (ngSubmit)="onSubmit($event)">
  <ngxfb-form class="demo-form-content" [formConfig]="formContent" />
  <div class="form-actions">
    <button type="submit">Print to console</button>
    <button type="button" (click)="reset()">Reset</button>
  </div>
</form>
