<div class="form-actions">
  <span>Form:</span>
  <button type="button" (click)="useForm('maintenance')">Large Maintenance</button>
  <button type="button" (click)="useForm('computed')">Highly Computed</button>
</div>
<form [formGroup]="form" (ngSubmit)="onSubmit($event)">
  <ngxfb-form [formConfig]="formContent" />
  <div class="form-actions">
    <button type="submit">Print to console</button>
    <button type="button" (click)="reset()">Reset</button>
  </div>
</form>
