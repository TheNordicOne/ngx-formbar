@if (!isHidden()) {
  <div class="inline-input" [attr.data-testId]="testId()">
    <label [htmlFor]="name()" [attr.data-testId]="`${testId()}-label`">{{ label() }}</label>
    <div class="radio-group">
      @for (option of options(); track option) {
        <div class="radio-option">
          <input
            type="radio"
            [id]="option.id"
            [value]="option.value"
            [formControlName]="name()"
            [attr.data-testId]="`${testId()}-input-${option.id}`"
          />
          <label [htmlFor]="option.id">{{ option.label }}</label>
        </div>
      }
    </div>
    @for (error of errors() | keyvalue; track error.key) {
      <span [attr.data-testId]="`${testId()}-validation-error-${error.key}`">
        {{ error.value === true ? error.key : error.value }}
      </span>
    }
  </div>
}
